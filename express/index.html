<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABES Engineering College</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Section -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">ABES</h1>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link" data-section="home">Home</a></li>
                <li><a href="#" class="nav-link" data-section="work">Work</a></li>
            </ul>
        </div>
    </nav>

    <!-- Home Section -->
    <section id="home" class="section active">
        <div class="hero-container">
            <div class="hero-left">
                <h2>ABES Engineering College</h2>
                <p>Leading Institute of Engineering Excellence</p>
            </div>
            <div class="hero-right">
                <img src="https://www.shutterstock.com/image-vector/set-sign-forms-colorful-gradient-600nw-2082628327.jpg" alt="ABES Engineering College" />
            </div>
        </div>
    </section>

    <!-- Work Section -->
    <section id="work" class="section">
        <div class="hero-container">
            <div class="work-content">
                <h2>Our Work</h2>
                <button class="click-button" onclick="handleWorkButtonClick()">Click Me</button>
                <p id="work-message" class="work-message"></p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
